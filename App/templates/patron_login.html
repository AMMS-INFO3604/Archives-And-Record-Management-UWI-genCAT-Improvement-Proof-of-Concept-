{% extends "layout.html" %}
{% block title %}Patron Login{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="card login-card" style="border-top: 4px solid var(--secondary-color);">
        <div class="login-header">
            <i class="material-icons" style="color: var(--secondary-color);">person</i>
            <h1 style="color: var(--secondary-color);">Patron Login</h1>
            <p>Access your record loans and requests</p>
        </div>

        <form method="POST" action="/login">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required placeholder="Enter your patron ID">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; height: 48px; margin-top: 16px; background: var(--secondary-color);">
                Sign In
            </button>
        </form>

        <div style="margin-top: 24px; text-align: center; border-top: 1px solid var(--border-color); padding-top: 24px;">
            <p style="color: var(--text-secondary); font-size: 14px;">
                Are you a staff member? <a href="{{ url_for('auth_views.staff_login_page') }}">Staff Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
