{% extends "layout.html" %}
{% block title %}Staff Login{% endblock %}

{% block content %}
<style>
    body { background-color: #f5f5f5 !important; }

    .login-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 56px - 40px);
        padding: 32px 16px;
    }

    .login-card {
        background: #fff;
        border: 1.5px solid #e0e0e0;
        border-top: 4px solid #212121;
        border-radius: 14px;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 6px 32px rgba(0,0,0,.08);
        overflow: hidden;
    }

    .login-header {
        background: #212121;
        padding: 28px 32px 24px;
        text-align: center;
    }

    .login-header .logo-area {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 10px;
    }

    .login-header .logo-area i { font-size: 32px; color: #bdbdbd; }

    .login-header h1 {
        color: #fff;
        font-size: 1.1rem;
        font-weight: 800;
        letter-spacing: .8px;
        text-transform: uppercase;
        margin: 0;
    }

    .login-header .role-badge {
        display: inline-block;
        margin-top: 10px;
        background: rgba(255,255,255,.1);
        color: #e0e0e0;
        font-size: .72rem;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        padding: 3px 12px;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,.18);
    }

    .login-header .header-subtitle {
        color: #9e9e9e;
        font-size: .82rem;
        margin: 8px 0 0;
    }

    .login-body { padding: 32px 32px 28px; }

    .login-body h2 {
        font-size: 1.2rem;
        font-weight: 700;
        color: #212121;
        margin: 0 0 6px;
    }

    .login-body .subtitle {
        font-size: .85rem;
        color: #757575;
        margin: 0 0 24px;
    }

    .login-body .input-field label {
        color: #616161 !important;
        font-weight: 600;
        font-size: .82rem;
    }

    .login-body .input-field input:focus + label,
    .login-body .input-field input.active + label {
        color: #212121 !important;
    }

    .login-body .input-field input {
        border-bottom: 1.5px solid #bdbdbd !important;
        box-shadow: none !important;
    }

    .login-body .input-field input:focus {
        border-bottom: 2px solid #212121 !important;
        box-shadow: none !important;
    }

    .btn-login {
        width: 100%;
        background: #212121 !important;
        color: #fff !important;
        font-weight: 700 !important;
        letter-spacing: .5px;
        border-radius: 8px !important;
        height: 44px !important;
        line-height: 44px !important;
        font-size: .9rem !important;
        margin-top: 8px;
        box-shadow: 0 4px 14px rgba(0,0,0,.15) !important;
    }

    .btn-login:hover { background: #424242 !important; }

    .btn-quick-login {
        width: 100%;
        background: #fff !important;
        color: #616161 !important;
        font-weight: 600 !important;
        letter-spacing: .5px;
        border-radius: 8px !important;
        height: 40px !important;
        line-height: 40px !important;
        font-size: .82rem !important;
        margin-top: 10px;
        border: 1.5px dashed #bdbdbd !important;
        box-shadow: none !important;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: border-color .2s, color .2s;
    }

    .btn-quick-login:hover {
        border-color: #757575 !important;
        color: #212121 !important;
    }

    .login-footer {
        border-top: 1px solid #f5f5f5;
        padding: 14px 32px;
        text-align: center;
        font-size: .75rem;
        color: #bdbdbd;
    }
</style>

<div class="login-wrapper">
    <div class="login-card">

        <div class="login-header">
            <div class="logo-area">
                <i class="material-icons">archive</i>
                <h1>genCAT</h1>
            </div>
            <span class="role-badge">Staff Portal</span>
            <p class="header-subtitle">Welcome to genCAT Records Management</p>
        </div>

        <div class="login-body">
            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to your staff account to continue.</p>

            <form method="POST" action="/login">
                <div class="input-field">
                    <input type="text" id="username" name="username" required placeholder="Enter your username" />
                    <label for="username">Username</label>
                </div>

                <div class="input-field">
                    <input type="password" id="password" name="password" required placeholder="Enter your password" />
                    <label for="password">Password</label>
                </div>

                <button type="submit" class="btn waves-effect waves-light btn-login">
                    Login
                </button>
            </form>

            <!-- Quick Login Button -->
            <button class="btn-quick-login" onclick="quickLogin()">
                <i class="material-icons" style="font-size: 16px;">bolt</i>
                Quick Login (Demo)
            </button>


        </div>

        <div class="login-footer">
            &copy; 2026 genCAT &mdash; GEN2 Records Management System, UWI
        </div>

    </div>
</div>

<script>
    function quickLogin() {
        document.getElementById('username').value = 'bob';
        document.getElementById('password').value = 'bobpass';
        // Trigger Materialize label float
        document.getElementById('username').classList.add('active');
        document.getElementById('password').classList.add('active');
        // Auto submit
        document.querySelector('form').submit();
    }
</script>

{% endblock %}
