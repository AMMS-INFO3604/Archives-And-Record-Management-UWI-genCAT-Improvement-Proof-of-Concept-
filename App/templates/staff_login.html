{% extends "layout.html" %}
{% block title %}Staff Login{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="card login-card">
        <div class="login-header">
            <i class="material-icons">lock</i>
            <h1>Staff Login</h1>
            <p>Welcome to genCAT Records Management</p>
        </div>

        <form method="POST" action="/login">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; height: 48px; margin-top: 16px;">
                Sign In
            </button>
        </form>

        <div style="margin-top: 24px; text-align: center; border-top: 1px solid var(--border-color); padding-top: 24px;">
            <p style="color: var(--text-secondary); font-size: 14px;">
                Not a staff member? <a href="{{ url_for('auth_views.patron_login_page') }}">Login as Patron</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
